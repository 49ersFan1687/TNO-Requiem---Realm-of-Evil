l_english:
 DIR_BEST: "Dirlewanger's Realm"
 DIR_BEST_DEF: "Dirlewanger's Realm"
 DIR_BEST_ADJ: "Dirlewanger"
 DRL_THENEWORDER_DESC: "Oskar Dirlewanger and his Black Brigade terrorize the Southern Urals, plundering anything of value and brutalizing anyone unfortunate enough to fall into their hands. Their settlements are little more than camps of violence and loot, their rule held together by fear, raids, and the personal authority of the Bandit King.\n\nDead at the feet of Dirlewanger and his men are countless civilians, prisoners, and enemies. Those who resist are butchered. Those who submit are robbed. Those who are ignored are merely waiting for the next raid. Yet in the chaos of the Urals, even this horde may dream of conquest."
 BOOKMARK_DRL_NEW: "§RDIRLEWANGER BRIGADE§!"
 BOOKMARK_DRL_NEW_DELAYED: "§YNEW IN§! §RTNOR: REALM OF EVIL§!\n§W--------------§!\n\n§YPlayable Southern Urals content for Oskar Dirlewanger's Black Brigade.§!\n\nBegin as the Brigade in Orsk, raid and conquer the Southern Urals, and unlock West Russian Smuta decisions after §YAnd Beyond the South§!. From there, Dirlewanger can attempt to force the rest of Russia beneath the black banner."
 DRL_and_beyond_the_south: "And Beyond the South"
 DRL_and_beyond_the_south_desc: "The Southern Urals were only the beginning.\n\nBeyond the mountains and steppe lies a fractured Russia, full of warlords who believe themselves destined to reunite the motherland. Let them dream. The Brigade has crossed every line it was told to fear, and it has survived every enemy that promised to end it.\n\nNow the realm looks west."
 DRL_and_to_orenberg: "And to Orenburg"
 DRL_and_to_orenberg_desc: "Orenburg's communes believe disunity makes them free. It only makes them vulnerable.\n\nTheir militias are scattered, their leaders argue, and their settlements are rich enough to tempt every man in the Brigade. Once the march begins, there will be no time for their debates, votes, or pleas.\n\nThe road west leads through Orenburg."
 DRL_and_with_power: "And with Power"
 DRL_and_with_power_desc: "The men of the Brigade are hard. But gorging on plunder, that ever present goal, has a disturbing tendency to turn them soft. A lazy bandit is a dead bandit, and we have no intention of dying.\n\nWe'll keep their beds hard, their barracks barely warm enough, and their liquor share sufficient, but only just. We'll keep them alert.\n\nAlert enough so that, when the command is given, they will eagerly jump for the chance to participate in another 'expedition.'"
 DRL_and_with_superiority: "And with Superiority"
 DRL_and_with_superiority_desc: "Our enemies have walls, militias, laboratories, communes, and old soldiers. We have speed, brutality, and the certainty that hesitation kills.\n\nThat will be enough if we choose our ground well. The Brigade must strike where its enemies are divided, exhaust them before they can unite, and leave each rival too broken to aid the next.\n\nSuperiority is not given. It is made."
 DRL_as_fast_as_we_must: "As Fast as We Must"
 DRL_as_fast_as_we_must_desc: "The Southern Urals are vast, but no enemy can defend every road, pass, and settlement at once.\n\nOur trucks are few, worn, and ugly, but they move faster than frightened men on foot. If the Brigade is to win, it must move before its enemies understand where the main blow will fall.\n\nSpeed will do what numbers cannot."
 DRL_bandit_state_warlord_1: "Bandit State"
 DRL_bandit_state_warlord_1_desc: ""
 DRL_bandit_state_warlord_2: "Bandit State"
 DRL_bandit_state_warlord_2_desc: ""
 DRL_beginning: "The Beginning"
 DRL_beginning_desc: ""
 DRL_bring_horror_to_their_hearts: "Bring Horror to Their Hearts"
 DRL_bring_horror_to_their_hearts_desc: "Fear won the Brigade its realm, and fear will preserve it.\n\nThe people of the Southern Urals must understand that resistance brings only ruin. Not tomorrow, not after negotiation, but immediately and without restraint. If they cannot love their new masters, they will learn to dread them.\n\nA terrified land is an obedient land."
 DRL_end_the_last_bastards: "End the Last Bastards"
 DRL_end_the_last_bastards_desc: "The Soviets lost, but as the Russian members of the Brigade make sure to constantly emphasize, they were, and are, masters of deception. Of the maskirovka.\n\nThey used that mastery, many years ago, to sow confusion among both the Wehrmacht and their other enemies. Our enemies are smaller than the Soviets' were, but they are enemies all the same. If we can learn some of these strategies of deception, modify them to suit our purposes, and deploy them on our next raid, we could increase effectiveness significantly.\n\nOr, at the very least, give them less time to hide their valuables."
 DRL_flawless_execution: "Flawless Execution"
 DRL_flawless_execution_desc: "The campaign has been brutal, wasteful, and ugly. That does not mean it was careless.\n\nEvery enemy fell in turn, every rival was isolated, and every victory opened the way to the next. The officers may boast, the men may drink, and Dirlewanger may call it genius if he wishes.\n\nWhat matters is that it worked."
 DRL_lessons_from_the_ss: "Lessons from the SS"
 DRL_lessons_from_the_ss_desc: "Dirlewanger's men may have become bandits, but their origins still offer lessons in terror, discipline, and organized violence.\n\nThe old methods were never elegant, but elegance is not required. What matters is that orders are obeyed, enemies are identified, and punishment is carried out with enough certainty to shape the behavior of everyone who remains.\n\nThe Brigade remembers more than it admits."
 DRL_new_tactics: "New Tactics"
 DRL_new_tactics_desc: "The Brigade exists because of enjoyment tactics. Enjoyment of using that which was taken by force of arms from the cold, dead, hands of weaker men.\n\nWhat 'that' is - wine, women, drugs, games, books, or anything else at all - doesn't matter. The boss knows this very well, so the spoils will be distributed exactly on the principle of “an equal share for everyone”, and revelry will be encouraged.\n\nAll our units will be equally encouraged by this tactic. It follows that a happy gangster is always motivated to stay that way and will gladly carry out any orders that help him do so."
 DRL_not_a_single_one_left: "Not a Single One Left"
 DRL_not_a_single_one_left_desc: "The last holdouts cling to old uniforms, old prayers, and old hopes.\n\nAll of it must end. The Brigade will hunt down the remaining fighters, collaborators, and would-be avengers until no organized resistance remains in the South. What cannot be bought, frightened, or scattered will be destroyed.\n\nNot a single one will be left to rally the rest."
 DRL_our_army_of_bandits: "Our Army of Bandits"
 DRL_our_army_of_bandits_desc: "Nobody in Russia, on either side of the Urals, is meaner, tougher, or stronger than the men of the Brigade. It's time to prove that once again.\n\nIn order to provide motivation, some of the previous spoils will be spread around. Loot, liquor, and the provision of women still capable of providing entertainment will remind them of what's to come.\n\nOur next 'expedition' is fast approaching, and they must be enthusiastic for it!"
 DRL_our_leader: "Our Leader"
 DRL_our_leader_desc: "Oskar Dirlewanger has led us to victory, and enrichment, against foes weak and strong, time and time again. From our 'service' within the SS, to our escape when the Wehrmacht tried to disarm us, to our capture of the lands around Orsk, he has always shown us the way.\n\nAnd that way is to take. We take what we want, and we want it all. Everything in the Southern Urals - wealth, women, land - belongs to us. It just hasn't been collected yet.\n\nWe're going to correct that."
 DRL_preparing_to_strike: "Preparing to Strike"
 DRL_preparing_to_strike_desc: "The Brigade has spent years surviving through raids, terror, and retreat. That will no longer be enough.\n\nIf the whole Southern Urals are to be dragged beneath our banner, every truck, rifle, and cutthroat in Orsk must be made ready. The old raids were practice. What comes next will be conquest.\n\nThe men are restless. Good. Restless men can be pointed at an enemy."
 DRL_securing_our_bedrock_first: "Securing Our Bedrock First"
 DRL_securing_our_bedrock_first_desc: "Dirlewanger might be an old hand at raiding, but he is also just that: old. Old and weak.\n\nOld bandits don't last long, and when they go down, so too does everybody who stays loyal to them. We will make this fact understood to the Russian members - the majority - of the Brigade, and work to bring them to our side. Increased shares, stolen spoils, and anything else necessary will be promised.\n\nWhen the time comes, Dirlewanger, and the few remaining non-Russians who remain loyal to him, will find themselves alone. And easy prey besides."
 DRL_send_fear: "Send Fear"
 DRL_send_fear_desc: "A lot of people think that the men of the Brigade are simple bandits, capable of nothing more than simple brutality in the pursuit of plunder. Most of those people are dead.\n\nWe may be brutal, and we may want to plunder, but we are no simpletons. Raids must be planned. Loot must be transported. Casualties must be managed. Terror must be applied in just the right fashion.\n\nDirlewanger, and the Brigade at large, have been doing this for years. And we will continue to do so, as we prepare for the biggest raids yet!"
 DRL_send_horror: "Send Horror"
 DRL_send_horror_desc: "We raid for wealth, entertainment, and many other reasons, but one of the most valuable things we find is flesh.\n\nEvery single person we take captive during a raid can be utilized. Women can be used until they can be used no more, and men can either be put to work or, if they are strong enough, pressed into service. All can serve.\n\nAnd they will serve. Or they will die."
 DRL_strike_away_all_insurgency: "Strike Away All Insurgency"
 DRL_strike_away_all_insurgency_desc: "Every conquered land leaves survivors who think the war can continue from the shadows.\n\nThey are wrong. The Brigade will sweep the roads, search the villages, and make examples of anyone still carrying old banners or old loyalties. Mercy would only teach them to wait for another chance.\n\nThere will be no second chance."
 DRL_strike_the_ural_league: "Strike the Ural League"
 DRL_strike_the_ural_league_desc: "The Ural League has long styled itself the shield of the Southern Urals, a refuge for those who fear the Brigade and a sword for those foolish enough to fight us.\n\nThat shield must be shattered. Their guards, fortresses, and mountain paths are dangerous, but danger has never stopped our men when there is loot behind it.\n\nLet the League learn that no wall is high enough."
 DRL_the_art_of_pillage: "The Art of Pillage"
 DRL_the_art_of_pillage_desc: "Surrounded by enemies, by those who would think to stop us or end our right to plunder, we refuse to die like they so desperately hope! We take! We ride!\n\nWe ride over any man foolish enough to play soldier, over any village foolish enough to arm a militia, and over anyone else who dares to try and stop us. We'll find whatever - or whomever - they try to protect, and load it up over their corpses.\n\nGet ready, boys! We ride for plunder!"
 DRL_the_aryan_army_in_the_dark: "The Aryan Army in the Dark"
 DRL_the_aryan_army_in_the_dark_desc: "It's coming, and soon.\n\nA big showdown with the Ural League is approaching, and we are going to destroy them. We are going to kill their men, rape Orenburg into the ground, in every way possible, and prove to everyone that nobody can stop the Brigade!\n\nAnd after that? Without the League around to organize defenses and provide 'advisors' to villages? Well, we'll loot the whole region. Who could stop us?"
 DRL_the_black_bandits_of_the_orsk: "The Black Bandits of Orsk"
 DRL_the_black_bandits_of_the_orsk_desc: "These lands might belong to us, but not everyone accepts that. The Ural League, a pathetic collection of communities led by a criminal priest, have hunted us time and again, and though we've evaded or destroyed their parties, more always come.\n\nOtherwise pinned between the madmen to the east, the steppes to the south, and the communes to the west, the League thinks they can destroy us once and for all. But what they don't know is that we have them right where we want them. We'll hold our own, bleed them dry and then, in time, strike back and take Orenburg.\n\nAnd when we do, they will truly learn why the Brigade is so feared."
 DRL_the_magnitogorsk_finale: "The Magnitogorsk Finale"
 DRL_the_magnitogorsk_finale_desc: "Magnitogorsk has hidden behind its mountain, its laboratories, and the reputation of the madman who rules it for too long.\n\nThe Black Mountain may be strange, fortified, and filled with horrors, but it is also filled with weapons, machinery, and secrets worth taking. Lysenko's realm will not be allowed to stand apart from our new dominion.\n\nThe finale begins at the mountain."
 DRL_the_realm_begins: "The Realm Begins"
 DRL_the_realm_begins_desc: "The Brigade has survived - and thrived - by understanding its environment. When we broke away from Germany, we had to adapt our doctrine, altering it to suit the Urals and our needs for raiding.\n\nWith our new deal in place, Lysenko's instructors are imparting to us Soviet tactics. Some of the smarter men have realized that combining the two - Soviet strength and discipline with the unorthodoxy and unpredictability of raiding maneuvers - could give us a real advantage over those who would see us destroyed.\n\nSo we will."
 DRL_the_south_all_ours: "The South All Ours"
 DRL_the_south_all_ours_desc: "The Southern Urals lie open before the Brigade. The League is broken, Orenburg is silent, and Magnitogorsk has been dragged down from its mountain throne.\n\nThere will be no congress, no proclamation of liberation, no promise of order beyond the order imposed by fear. The men have won their prize, and now they will gorge themselves on it.\n\nThe South is ours."
 DRL_the_south_conquered: "The South Conquered"
 DRL_the_south_conquered_desc: "Conquest is only the beginning. Holding what we have taken will require patrols, reprisals, and enough terror to make rebellion feel impossible.\n\nThe old powers of the Southern Urals are gone, but their remnants still whisper in forests, ruins, and mountain paths. Those whispers must be answered before they become a shout.\n\nThe South is conquered. Now it must be kept."
 DRL_to_conquer_the_south: "To Conquer the South"
 DRL_to_conquer_the_south_desc: "The time for raids is ending. The time for conquest has come.\n\nOrenburg, the Ural League, and Magnitogorsk have all survived because the Brigade was content to circle them like a storm on the horizon. No longer. Their lands, their arsenals, and their people will be seized, burned, or broken as needed.\n\nThe South will belong to us."
 DRL_to_purify_orsk: "To Purify Orsk"
 DRL_to_purify_orsk_desc: "When the Brigade rides, it always returns with mountains of loot. But it also returns with the problem of keeping track of that loot.\n\nShares must be properly distributed, and even with the penalty known, some men always try to take more. This cannot be allowed to continue - every man gets a share, and the size of that share depends on many things. An inventory of all spoils must be meticulously generated, kept, and regularly updated.\n\nAfter all, how else will we know when it's time to go and take more?"
 DRL_wipe_out_insurgents: "Wipe Out Insurgents"
 DRL_wipe_out_insurgents_desc: "The Soviets might have lost their grand war against the Reich, but those of us still around from those times well remember how hard they fought, and how many Germans they killed, before capitulating.\n\nThey accomplished this through tough, uncompromising, and sometimes brutal training. Training that we now have access to, courtesy of Lysenko's instructors. And we intend to exploit it. As many of our men as possible will be sent to, hopefully, learn better and more efficient tactics.\n\nIf those tactics lead to more successful raids, so much the better."
 DRL_with_fury: "With Fury"
 DRL_with_fury_desc: "Fear has carried us far, but fury will carry us farther.\n\nEvery insult, every ambush, every village that dared to resist, and every petty warlord that thought the Brigade could be contained must be repaid. The men do not need careful speeches. They need a target and permission.\n\nSoon, they will have both."
 DRL_with_glory: "With Glory"
 DRL_with_glory_desc: "There is no glory in mercy, no honor in restraint, and no reward for leaving wealth in another man's hands.\n\nThe Brigade has bled for years in the Southern Urals. Now the men will be promised the victory they believe they deserve: banners raised, enemies scattered, and spoils enough to drown every complaint.\n\nGlory, for men such as ours, is simply plunder with a louder song."
 DRL_with_power: "With Power"
 DRL_with_power_desc: "Power is not declared from a desk. It is proven by the sound of engines, the weight of rifles, and the silence left behind after resistance ends.\n\nOur command must gather what authority it still has and force the Brigade into motion. The coming campaign will require more than scattered raids. It will require obedience, however temporary.\n\nPower first. Pleasure after."
 DRL_with_strength: "With Strength"
 DRL_with_strength_desc: "Strength is the only law that matters in the wastes. The weak beg, the frightened hide, and the strong take what they please.\n\nOur men must be reminded of this before the march begins. Discipline may be crude, and loyalty may be bought with loot, but the Brigade can still be made into a weapon sharp enough to break our neighbors.\n\nLet them see our strength, and despair."
