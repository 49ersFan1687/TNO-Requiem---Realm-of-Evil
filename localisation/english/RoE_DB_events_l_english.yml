 DRL_beginning.1.t:0 "Breathing Room"
 DRL_beginning.1.desc:0 "It was almost night as the meeting of the officers went on for quite some time now. After question of economy, if one could even talk of such a thing in the hell which was Dirliwenger's realm, came the question of the raids.\n\n"That make about 5 months of supply for our soldiers in the north, certainly we can get more? With the bolshevik pigs at our doors but disabled we could in fact think of a way to make gains for our supplies."\nThe officer turned to Oskar.\n\n"So what would you say, Oskar?"\n\nThe man was out of his mind, his thought brought him away. That such a man could actually think, that he could even have something that ressembled reason was frightening to any person who had heard of his deeds. Yet that monster sitting in the room was lost in his thoughts. For years now he had survived, he had thrived on the lives of thousands, he had burned throught the lands and the people of Russia.\n\nFor years now he had burned and pillaged the lands, and as he sat upon it he was still looking to set it ablaze. Surely fate should caught onto the criminal, surely god or the reightous man would bring justice before him and his bandits. But he was still there, well alive, that troubled him, even he was troubled.\nWhat could even have make him so lucky?\nSurrounded from everywhere and yet still left, as a cancer on a blooted skin, waiting to expand.\n\n"So Oskar?". The man shook up his mind and put himself back onto the meeting."
 DRL_beginning.1.a:0 ""Hmm, well, burn through the north and take what we can up there""

 DRL_beginning.2.t:0 "Insurgency"
 DRL_beginning.2.desc:0 "As Oskar's bandits assembled in the orderly fashion which was the norm of their disciplined barbarism, he himself observed as his hysterical band of men grouped to form what had now taken the name of columns of death. As he waited for them to form he was visibly taken by an uncommon joy, a seemingly inthusiastic mood had overtaken his usual apathy. Today was a particular one for him and his men and the idea of it brought to him a strange feeling that only someone as sadistic as him could understand.\n\nAs the men fell in ranks and the sound of their continuous and disorderly motion collapsed into a slow silence, Oskar advanced onto his men and in the center of the square, as he walked slowly toward them he took out a paper of his pocket and finally he stopped.\n\n"Men! Theese are reports, reports of partisans activities."\n\n"Today they live, as parasites under our skin, they believe that thoose lands are theres."\n\n"There are no masters but us on these lands, they live today but they will not live to see tomorrow, whatever it may take to crush their pathetic resistance, this land will be filled with their blood and we shall live on."\n\n"Find them, hang them, burn the land, kill thoose who house them, burn their churches and their villages, errase them."\n\nAs he stopped and looked around he saw the faces of his men, almost all of them seemed to be identical, not by any ressemblance but simply with the same void in their look. They all shared one face, an unsatisfied yet sadistically joyful look as they awaited their battles to come.\n\nHe signaled to the officers that the time had come and as he looked to his men preparing for what he had only announced, he could not help but be again overwhelmed by the idea of crushing the bugs that plagued the skin of that land, and to such an idea he could only smile, smile as he saw again what he had done before and what he would do again, always, and until the very end of this world."
 DRL_beginning.2.a:0 "And he didn't regret about his subsequent actions"
 
 DRL_beginning.3.t:0 "Dealing with Rebels"
 DRL_beginning.3.desc:0 "The moorning was soon to be over, the sun was almost above the head of Alexendrov as he laboured the fields of his familly's small parcel of lands. Most of his village had been resting but the work of the land had taken more time than expect, and luck wasen't very common for Alexendrov.\n\nAs he had finished for now he and the horse that served him as to plow the land took their time of rest, and the tired labourer was quite reliefed to eat something even as meager as the bread an onion that composed his simple meal.\n\nSomething catched his attention as he looked beyond, the land had changed, and the sky bore columns of smoke in the distance. As time passed he could almost ear sounds of cracking gunfire. He was pretty sure that the clock had already struck 12 yet he could not ear the church's bell as they usually would.\n\nThe crackings and gunshots came closer and closer and Alexendrov began to grow worried, after some time he saw silhouettes that seemed to come towards him. As they came closer he was somewhat reassured to see that it was group of routing partisan. He stood as he was and the captain of the partisan's platoon came to him.\n\n"You should not be there." He said, his face and that of his man spoke a lot about them, they had just fled from something, and that something had left them troubled.\n\n"Why are you still here!", captain shouted at him as he took him by the shirt.\n\nHe was unable to speak, nothing came out of his mouth. Looking as it visible confusion the captain came back to his mind.\n\n"Go back from where you are from, take your familly, take everything and do not come back." Alexandrov still looked at the captain, still unable to move.\n\n"GO!"\n\nFinally he came back to his sense and almost instincticly he ran back as fast as he could to his village, he thought and it came to him that he heard of dirliwanger's bandit in the south, that sometime people who survived and fled would come passing."
 DRL_beginning.3.a:0 "He could only hope that he would survive..."
 
 DRL_beginning.4.t:0 "Their Fate"
 DRL_beginning.4.desc:0 ""It had been months since someone was stupid enough to actually try something, months! The boys were really getting bored."- so when a baker, a baker of all things, pulled a kitchen knife on a raider who'd taken a liking to his wife, the news spread throughout the Brigade like wildfire.\n\n"A volunteer! Finally, some entertainment!"\n\nThey didn't kill him immediately ofcourse. That would be wasteful, Direlwanger himself came to watch, which was an honor, really. He even put his bottle down, which meant he actually cared, the baker should have been flattered!\n\nThe man kept screaming about his wife, about "decency", about "God". The boys found this hilarious, had he somehow forgotten where he was living? Did he think he lived somewhere else? They weren't angry really, how could you be angry at something so wonderfully naive?\n\nWhat happened next took most of the afternoon, since it was creative work. Afterwards, they put wha was left of the thing where people could see it. Dirlewanger had already wandered off by then, once the man stopped screaming, there wasn't much point in staying.\n\nThe baker's wife watched the whole thing, and was taken away."
 DRL_beginning.4.a:0 "Some people really refuse to learn.."
 
 DRL_beginning.5.t:0 "Their End"
 DRL_beginning.5.desc:0 "Prisoners were sorted one by one in the yard behind the barracks. Dissenters, rumormongerds, people who resisted, the usual. The first batch of people got bullets, four shots simultaneously rang out and four bodies fell like meatbags onto the floor, dragged off and dumped, with the men handling the job looking bored. This really was routine work, nothing special.\n\nAnother group went to the basement. Death is a better alternative than what goes down there, the sounds carry through the pipes, through the walls. The screaming can last for hours, then eventually just die down, and when the job's done, the guards carry out what's left in poorly tied sacks and dump them.\n\nNow, the unlucky ones, really unlucky, went to the camp. A wired enclourse on the edge of town, filled with dread and starvation. Rations can come once a week, maybe. It was never enough, hunger turns men into something else. The ones who don't find their standing become food for the others, or by guard dogs who are purposefully kept lean. Eitherway, the problem solves itself.\n\nBy the end of the week, the yard was empty again and ready for the next batch."
 DRL_beginning.5.a:0 "Standard Procedure"
 
 DRL_beginning.6.t:0 "True Dark Power"
 DRL_beginning.6.desc:0 "All the soldiers gathered in the square, every killer, rapist, outcast who'd found a home under the black banner. Germans who'd fled the Reich. Russians who'd abandoned their people to plunder over being in poverty. Kazakhs, Poles, deserters, murderers. The scum of dozens of nations, united by blood and hunger. Dirlewanger stood before all of them on an overturned truck, bottle in one hand, pistol in the other, and grinned gleefully.\n\n"I'd assume we die in the mountains," he called out.\n\n"Freeze in the snow. Starve in the wasteland. Get torn apart by partisans." He took a long swig of his drink and hurled the empty bottle to the crowd.\n\n"That was ten years ago. We're still here.. And now?!" He spread his arms wide.\n\n"Now its time for us to unify these lands!"\n\nA roar went up across the soldiers- or these weren't soldiers. Not in any proper sense atleast, but months of drilling had beaten discipline into them. They could march, hold a line when ordered, and could kill on command, that was enough.\n\n"City of cowards who can't stop arguing long enough to load rifles, old men playing at being soldiers." He spat.\n\n"And Lysenko's freak experiments in the mountains, cutting people apart for 'science.' All of them really do think they're untouchable.."\nCruel laughter rippled through the crowd.\n\n"The men, we burn. The women, we take. The children..." He shrugged.\n\n"Whatever amuses you, as this land is our land now, ours to bleed dry!"\n\nAnother roar much louder than before. Rifles beat against the ground, someone fired into the air. You see- these soldiers didn't believe in causes or nationalities, no. They believed in the Bandit King who'd kept them fed and happy for a decade, and they believed what was coming.\n\nDirelwanger raised his pistol towards the horizon as the sun slowly rose above the cold wasteland, towards everything soft and weak.\n\n"Let's go!""
 DRL_beginning.6.a:0 "The Horde marches"
 
 DRL_beginning.7.t:0 "The Realm Begins"
 DRL_beginning.7.desc:0 "The wind was heavy that day as the sun rose slowly, the wind shook the cliff's herb as the wave come crashing down onto the beach. Like any morning it was silent, very much so, often the morning silence was a daily calm before the storm. Before the raids, before the skirmish, before the pillages.\n\nBut for some days now that silence had become common, the land had quiet, and with it the life of the land. The man who's horror had brought this land to dusk now stood there, on that cliff.\n\nLooking down upon the thoose mountains, his glaze was one of thirst. The lands before him, under his foot had been soaked, dried and rotten to its core. Its land burned as he looked to what was before him. He had survived, the world was his, all of it, the lives, the wealth, the fields, the mines. It was his, all his and only his.\nHe turned to the officer beside him.\n\n"It is right before us, our due, its all there, behind thoose mountains is ou very destiny."\n\nThe officer seemed to both understand him and also hardly able to see him as reasonnable. He only responded:\n\n"The world belongs to us, Herr general."\n\nOskar continued to mutter.\n\n"The world is ours, all ours, tomorrow we shall walk on top on it."\n\nThe officer looked at the mountains, he too was of a crazy kind, but it seemed even foolness dosen't protect you from thinking, because for the first time in his life the man began to fear for else that himself. He knew that after all he had seen, when they should cross thoose mountains, the world would burn."
 DRL_beginning.7.a:0 "And those unworthy of this world will burn with it"
 
 DRL_beginning.8.t:0 "The State of the Bandit Army"
 DRL_beginning.8.desc:0 "The lieutenant stood at attention, trying his best not to look at the pistol on Dirlewanger's desk. Everyone knew what happened to messengers who brought bad news, but the Bandit king himself had asked for total honesty, and he was going to get it.\n\n"It's bad sir. Really bad."\n\nDirelwanger said nothing, pouring himself a drink and gestured for the man to continue with a grunt.\n\n"Half the men can't march five kilometers without collapsing, and the other half won't even follow orders unless there's loot. Discipline is- well.. there isn't. Last week, three men killed each other over a card game, and the week before, a whole squad deserted."\n\nThe lieutenant swallowed before continuing.\n\n"We've got rifles, yet half of them jam. We've got ammo, but no one's taught these idiots how to aim. Most of them have never even held a proper line in their lives, they know how to raid villages but not actually fight disciplined soldiers."\n\nDirelwanger's expression hadn't changed, this was a lot scarier than him being angry.\n\n"If we march now, we lose. They'd cut through us like paper, we are really not that much of an army sir. We're just a group of low ranking bandits with guns."\n\nDirelwanger drained his glass, before throwing it onto the wall.\n\n"So- you're telling me, that my men, the men who survived ten years in this frozen shithole, can't handle a bunch of anarchists and prison guards?!"\n\n"We- we can't handle anyone, not yet anyway.." The lieutenant said, trying not to meet his eyes. We need to become a real army as soon as possible or we die in the first battle..."\n\nThe silence stretched, before Dirlewanger laughed.\n\n"Fine." He poured another drink. "Make them into soldiers, I don't care how, beat it into them if you have to." He raised the glass.\n\n"But if we're not ready by spring, I'm feeding you to the dogs." He said, pointing his pistol at the man.\n\nThe lieutenant saluted hastily and ran off, before Direlwanger could change his mind."
 DRL_beginning.8.a:0 "There is much to be done"
 
 DRL_beginning.9.t:0 "Our Leader"
 DRL_beginning.9.desc:0 "Every man of the group of bandits was lined up with what resembled close enough to a disciplined square formation in the center of the now deserted village which had become their barracks. They waited with impatience for their guest, and as the time seemed to be longer and longer, the roar of a car announced the imminent start of their hastily prepared ceremony.\n\nThe car stopped slowly in front of the squared bandit whose commander quickly rushed toward the stopping car to greet his "king". The long awaited king as he was sometimes called by his troop, or Oskar for the intimate servants of his hell, had finally arrived. He got out of his car, seemingly surprised to see his man almost close to looking like an army, he hastily saluted the commander and immediately caught attention to the center of the village's ground around which the bandits had formed.\n\nThere on the dirt ground was assembled in a few piles, all sorts of haul from the men's pillage. It was a series of captured guns, boots also, but the biggest price was a pile of shining pieces that as a whole were difficult to distinguish. As he got closer Dirliwanger could start to see what he had before him. Rings, jewels often of silver and sometimes gold, quite rare; only a few had been found. But the biggest stack was one of golden relics, taken from the churches and the region's sanctuaries and monasteries. As such they were useless symbols of the feeble beliefs of the people of this land, soon it would be broken and refit to become the bandit's treasure.\n\nAs he looked closely to the assembled mass of pillage, the commander looked to him and in a high pitch, almost shouting said:\n\n"Herr Dirliwanger, our leader, to you we give what is due."\n\nThe band of soldiers acclaimed their leader, they seemed as a band a viking praising their chief. To whom they gave the work of their cruelty on the lands they pillaged, ravaged, sacked, murdered, not only the people but the land itself. If one could see those very lands before him, it would seem to him that someone had plunged a dagger deep into this land. There was no blood, it was all buried, swallowed by the lands. And the skin of the earth turned to grey, dried, dreaded, as it now bowed before its headsman."
 DRL_beginning.9.a:0 ""All heil Oskar!""
 
 DRL_beginning.10.t:0 "Its Time"
 DRL_beginning.10.desc:0 ""The shuttling from camp to the frontlines should enable us to bring most of our forces in by tomorrow, it is the best we can do with the trucks we have."\n\nAs Oskar listened to his officer on their walk on the roadside, he and reached for the cigarettes that hid in his coat's pocket, a truck bloated of his bandits passed at the ridicilous speed that the muddy roads of southern ural forced uppon any motorised force. The passing of the truck caught his attention as quite often the men filling to its extremes the capacities of their machines of fortune would shout in acclamation to their bandit in chief, as the criminals pay respect to the greatest of their specie. As he looked backed to his pocket he realised the loss of his cigarette, which now lied in the muddy soil below him.\n\n"That land will eat everything that we have before we even know it." The officer, Heinrich, looked back to him.\n\n"Was it your last one ?"\n\nSeeing the hesitant pause of his superior, he pulled a cigarette out of his coat's pocket and handed it to Oskar. Both of them shared a lighter to lit their cigarette, and both stood there, in the silence of their moment. The sudden calm ended abrutpetly as an other of the streched column's truck passed by and the bandits shout's brought war back to the mad king's head. Oskar turned to his officer as the Truck drove away from them toward the soon to be newly baptised frontline in the north.\n\n"How many trucks do we have ?"\n\n"About a 100, the reports i was given indicated 106 exactly, so have broken down since, russian mechanic..."\n\n"We have to make do with the inferior for now."\n\nOskar walked to the north, looking in the direction of the frontline."
 DRL_beginning.10.a:0 "Past thoose mountains nothing shall stop our rise"
 
 DRL_beginning.11.t:0 "Victory"
 DRL_beginning.11.desc:0 "After months of fighting, they finally did it, nobody thought it was possible, but they did it. Soldiers were shooting, looting, Drinking and dancing all across the Southern Urals after their greatest victory yet, conquering the entire region.\n\nDirlewanger was at the Orsk Town hall with his closest Friends, singing and drinking together over the recent news. The reunion room, once used by the former Mayor to discuss politics before the war, was now being used as a party room by the Devil of the Urals. While his friends drank alchool like camels, Dirliwanger grabbed a nearby glass cup, and gently tapped with a Silver spoon to grab the attention of everybody in the Room.\n\n"Gentlemens, Gentlemens, I have an announcement to make!" He said, the entire room stopped what they were doing and immediatly fixated their eyes on him.\n\n"Today was a great day... We achieved victory on those who wanted to see us dead! Not only that, but the gateway to Russia has finally been open! Once we cross the Urals...all of Russia will be our to Plunder!" The men in the room chanted, swinging their glasses of Vodka in the air in ecstasy.\n\n"All heil Oskar! All hail Oskar!" The men chanted again in their drunken voices, in reply to the chants.\n\nDirlewanger screamed "Sieg Heil!" on the top of his lungs, along side a Nazi Salute."
 DRL_beginning.11.a:0 "A King and His soldiers"
 
 DRL_wnews.1.t:0 "[Get_newspaper_header]The Bandit King Unifies Russia!"
 DRL_wnews.1.desc:0 "Concerning developpements has came from Russia, one even not thinkable in the minds of even the best specialists. Oskar Dirlewanger, a convicted war criminal known in his "Realm" as the Bandit King, completed the conquest of Russia.\n\nHis army, a ragtag band of criminals, exiled and mentally deranged, now rules over one of the largest span of land on Earth. Scattered reports from Russia can only bring a grim prospect of what life has now become in the now unified wastelands. The list of atrocities and their commoness are without equal, rumors even tell of deserted towns and widespread and chronical pillages, followed by their also common acts of brutality.\n\nThe man who now calls himself ruler of Russia, is a man of unequaled brutality, whose reputation has brought discomfort to even the most convinced nazis and SS, now sits on the land who's ravaging serve's his personnal lust for a strange conception of power.\n"
 DRL_wnews.1.a:0 "God has abandoned Russia"
