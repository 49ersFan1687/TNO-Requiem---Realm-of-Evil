 DRL_beginning.1.t:0 "Breathing Room"
 DRL_beginning.1.desc:0 "It was almost night as the meeting of the officers went on for quite some times now.After question of economy, if one could even talk of such a thing in the hell which was Dirliwenger's hell came the question of the raids.\n\n"That make about 5 months of supply for our soldiers in the north, certainly we can get more? With the bolchevik pigs at our doors but disabled we could in fact think of a way to make gains for our supplies."\nThe officer turned to Oskar.\n"So what would you say, Oskar?"\n\nThe man was out of his mind, his thought brought him away. That such a man could actually think, that he could even have something that ressembled reason was frightening to any person who had heard of his deeds. Yet that monster sitting in the room was lost in his thoughts. For years now he had survived, he had thrived on the lives of thousands souls, he had burned throught the lands and people of Russia.\n\nFor years now he had pressed the flesh of russia, he had bled it dry, and he was still pressing onto that dreaded earth. Surely fate should caught onto the criminal, surely god or the reightous man would bring justice before him and his bandits. But he was still there, well alive, that troubled him, even he was troubled.\nWhat could even have make him so lucky?\nSurrounded from everywhere and yet still left, as a cancer and a blooted skin, waiting to expand.\n\n"So Oskar?". The man shook up his mind and put himself back onto the meeting."
 DRL_beginning.1.a:0 ""Hmm, well, kill them, burn them and take what we can up north!""

 DRL_beginning.2.t:0 "Missed a Few"
 DRL_beginning.2.desc:0 "Oskar Dirlewanger, leader of the infamous Dirlewanger Brigade, was killed by a partisan group yesterday. As he was on his way to a meeting with Lysenko, a small band of ex-NKVD partisans ambushed him and his men, killing Dirlewanger himself as well as several members of the Brigade.\n\nWhile the Brigade has exacted revenge on the village where this took place, without Dirlewanger at the helm, the Brigade has all but splintered. Various factions have already begun breaking off to terrorize the Urals, though it is likely they will find no quarter anywhere in Russia."
 DRL_beginning.2.a:0 "A fitting end to that madman."
 